trigger:
- main

variables:
  terraformVersion: '1.5.0'
  azureServiceConnection: 'Hub -N-Spoke'   # 🔴 change this
  workingDirectory: '$(System.DefaultWorkingDirectory)/Project1_hub_N_spoke'

stages:

# 🔹 Stage 1: Terraform Plan
- stage: Terraform_Plan
  displayName: "Terraform Plan Stage"

  jobs:
  - job: Plan
    displayName: "Run Terraform Plan"
    pool:
      vmImage: 'ubuntu-latest'

    steps:

    # Install Terraform
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # Azure Login + Plan
    - task: AzureCLI@2
      displayName: "Terraform Init, Validate & Plan"
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd $(workingDirectory)

          terraform init
          terraform validate
          terraform plan -out=tfplan

    # Publish Plan Artifact
    - task: PublishBuildArtifacts@1
      displayName: "Publish Terraform Plan"
      inputs:
        pathToPublish: '$(workingDirectory)/tfplan'
        artifactName: 'terraform-plan'
        publishLocation: 'Container'


# 🔹 Stage 2: Manual Approval + Apply
- stage: Terraform_Apply
  displayName: "Terraform Apply Stage"
  dependsOn: Terraform_Plan

  jobs:
  - deployment: Apply
    displayName: "Manual Approval & Apply"
    environment: terraform-approval   # 🔴 must exist in ADO

    strategy:
      runOnce:
        deploy:
          steps:

          # Install Terraform
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)

          # Download Plan Artifact
          - task: DownloadBuildArtifacts@0
            inputs:
              artifactName: 'terraform-plan'
              downloadPath: '$(System.ArtifactsDirectory)'

          # Azure Login + Apply
          - task: AzureCLI@2
            displayName: "Terraform Apply"
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd $(workingDirectory)

                terraform init
                terraform apply $(System.ArtifactsDirectory)/terraform-plan/tfplan -auto-approve