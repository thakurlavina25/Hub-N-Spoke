trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  terraformVersion: '1.5.0'
  workingDirectory: '$(System.DefaultWorkingDirectory)/Project1_hub_N_spoke'

stages:

# =========================
# STAGE 1: TERRAFORM PLAN
# =========================
- stage: Terraform_Plan
  displayName: "Terraform Plan"

  jobs:
  - job: Plan
    displayName: "Run Terraform Plan"

    steps:

    # Install Terraform
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # Debug path
    - script: |
        echo "Current Directory:"
        pwd
        ls -la
      displayName: "Debug Info"
      workingDirectory: $(workingDirectory)

    # Terraform Init + Plan
    - script: |
        export ARM_CLIENT_ID=$(ARM_CLIENT_ID)
        export ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET)
        export ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID)
        export ARM_TENANT_ID=$(ARM_TENANT_ID)

        terraform init
        terraform plan -out=tfplan
      workingDirectory: $(workingDirectory)
      displayName: "Terraform Init & Plan"

    # Show plan (readable output)
    - script: |
        terraform show tfplan
      workingDirectory: $(workingDirectory)
      displayName: "Show Terraform Plan"

    # Publish plan artifact
    - publish: $(workingDirectory)/tfplan
      artifact: tfplan


# =========================
# STAGE 2: MANUAL APPROVAL
# =========================
- stage: Approval
  displayName: "Manual Approval"
  dependsOn: Terraform_Plan

  jobs:
  - job: WaitForApproval
    pool: server

    steps:
    - task: ManualValidation@0
      inputs:
        instructions: "Review Terraform plan and approve to proceed."
        onTimeout: "reject"
      timeoutInMinutes: 60


# =========================
# STAGE 3: TERRAFORM APPLY
# =========================
- stage: Terraform_Apply
  displayName: "Terraform Apply"
  dependsOn: Approval

  jobs:
  - job: Apply
    displayName: "Apply Terraform Changes"

    steps:

    # Install Terraform again
    - task: TerraformInstaller@1
      inputs:
        terraformVersion: $(terraformVersion)

    # Download plan artifact
    - download: current
      artifact: tfplan

    # Debug paths
    - script: |
        echo "Pipeline Workspace:"
        ls -la $(Pipeline.Workspace)
      displayName: "Check Downloaded Files"

    # Copy plan file + Apply
    - script: |
        export ARM_CLIENT_ID=$(ARM_CLIENT_ID)
        export ARM_CLIENT_SECRET=$(ARM_CLIENT_SECRET)
        export ARM_SUBSCRIPTION_ID=$(ARM_SUBSCRIPTION_ID)
        export ARM_TENANT_ID=$(ARM_TENANT_ID)

        cp $(Pipeline.Workspace)/tfplan/tfplan $(workingDirectory)/

        cd $(workingDirectory)

        terraform init
        terraform apply -auto-approve tfplan
      displayName: "Terraform Apply"